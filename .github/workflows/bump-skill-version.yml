name: Bump Skill Version

on:
  push:
    branches:
      - master
    paths:
      - 'skills/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set (plain semver, optional `v` or `skill-v` prefix, e.g. 1.5.0). Leave blank to auto-bump from commits.'
        required: false
        type: string

concurrency:
  group: bump-skill-version
  cancel-in-progress: true

jobs:
  bump-version:
    name: Bump SKILL.md version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine new version (auto)
        id: auto_tag
        if: github.event_name == 'push' || inputs.version == ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          tag_prefix: "skill-v"

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          AUTO_VERSION: ${{ steps.auto_tag.outputs.new_version }}
        run: |
          RAW="${INPUT_VERSION:-$AUTO_VERSION}"
          # Trim leading/trailing whitespace via bash parameter expansion
          shopt -s extglob
          RAW="${RAW##+([[:space:]])}"
          RAW="${RAW%%+([[:space:]])}"
          # Strip optional leading "skill-v" or "v"
          NORMALIZED="${RAW#skill-v}"
          NORMALIZED="${NORMALIZED#v}"

          if [ -z "$NORMALIZED" ]; then
            echo "No version resolved; skipping."
            echo "new_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! echo "$NORMALIZED" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid version: '$RAW' (normalized: '$NORMALIZED'). Expected semver like 1.5.0."
            exit 1
          fi

          echo "Resolved version: $NORMALIZED"
          echo "new_version=$NORMALIZED" >> "$GITHUB_OUTPUT"

      - name: Update SKILL.md version
        if: steps.version.outputs.new_version != ''
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          echo "Bumping to $NEW_VERSION"
          sed -i "s/^  version: \".*\"/  version: \"$NEW_VERSION\"/" skills/kelet-integration/SKILL.md

      - name: Commit and push
        if: steps.version.outputs.new_version != ''
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/kelet-integration/SKILL.md
          git diff --cached --quiet || git commit -m "chore: bump skill version to ${NEW_VERSION} [skip ci]"
          git fetch origin master
          git rebase origin/master
          git push

      - name: Tag and create release
        if: steps.version.outputs.new_version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          NEW_TAG="skill-v${NEW_VERSION}"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          PREV_TAG="$(git tag --sort=-v:refname | grep '^skill-v' | grep -v "^${NEW_TAG}$" | head -n1)"
          gh release create "$NEW_TAG" \
            --title "Skill v${NEW_VERSION}" \
            --generate-notes \
            ${PREV_TAG:+--notes-start-tag "$PREV_TAG"}
